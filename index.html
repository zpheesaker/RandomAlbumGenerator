<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Album Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- PapaParse for parsing CSV data easily -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Left Panel: Filters & Search -->
        <div class="panel left-panel">
            <h2>Filters & Search</h2>
                
            <details class="mobile-collapse" id="grpGenres">
                <summary class="lbl-like">Genre Hierarchy</summary>
                <div id="genreTree" class="scroll-box">Loading genres...</div>
                </details>
                
                <details class="mobile-collapse" id="grpDesc">
                    <summary class="lbl-like">Descriptors</summary>
                    <div class="desc-contents">
                        <input type="text" id="txtSearchDescriptors" placeholder="Search descriptors...">
                        <div class="actions-row">
                            <button id="btnSelectAll">Select All</button>
                            <button id="btnDeselectAll">Deselect All</button>
                        </div>
                        <div id="descriptorList" class="scroll-box">Loading descriptors...</div>
                    </div>
                </details>
            
            <div class="actions-row actions-main" style="margin-top: 15px;">
                <button id="btnRandom" class="primary-btn">Pick Random Album</button>
                <button id="btnClear" class="secondary-btn">Clear Filters</button>
            </div>
            <div id="lblMatchCount" class="status-lbl">Matched albums: 0</div>
        </div>

        <!-- Right Panel: Album Details -->
        <div class="panel right-panel">
            <div class="search-header">
                <h2>Search Albums:</h2>
            </div>
            
            <input type="text" id="txtAlbumSearch" placeholder="Type artist or album name...">
            <ul id="lstSearchResults" class="search-results"></ul>
            
            <h2 style="margin-top: 15px;">Album Details</h2>
            <pre id="txtAlbumDetails">Loading database...</pre>
            
            <div id="streamingLinks" class="streaming-row" style="display: none;">
                <a id="btnSpotify" href="#" target="_blank" class="secondary-btn stream-btn">Spotify</a>
                <a id="btnApple" href="#" target="_blank" class="secondary-btn stream-btn">Apple Music</a>
                <a id="btnYoutube" href="#" target="_blank" class="secondary-btn stream-btn">YouTube</a>
                <a id="btnQobuz" href="#" target="_blank" class="secondary-btn stream-btn">Qobuz</a>
            </div>
        </div>
    </div>
    
    <div class="site-footer">
        Data sourced from <a href="https://rateyourmusic.com/" target="_blank" rel="noopener noreferrer">Rate Your Music</a>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
